<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - TikTok For Business Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <svg width="220" height="40" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="28" font-family="-apple-system, sans-serif" font-weight="900" font-size="24" fill="#161823">TikTok</text>
            <circle cx="85" cy="18" r="2" fill="#25F4EE"/>
            <circle cx="85" cy="26" r="2" fill="#FE2C55"/>
            <text x="94" y="28" font-family="-apple-system, sans-serif" font-weight="600" font-size="20" fill="#161823">For Business</text>
        </svg>
    </div>

    <div class="main-container">
        <div class="login-box">
            <h1>Log in</h1>
            <div class="subtitle">
                Don't have an account yet? <a href="#">Sign up now</a>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <span>Email</span>
                    <a href="#">Use phone</a>
                </div>
                <div class="input-wrapper">
                    <input type="text" placeholder="Enter your email address">
                </div>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <span>Password</span>
                    <a href="#">Forgot password</a>
                </div>
                <div class="input-wrapper">
                    <input type="password" placeholder="Enter your password">
                    <div class="eye-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 4C7 4 2.73 7.11 1 12C2.73 16.89 7 20 12 20C17 20 21.27 16.89 23 12C21.27 7.11 17 4 12 4ZM12 17.5C8.96 17.5 6.5 15.04 6.5 12C6.5 8.96 8.96 6.5 12 6.5C15.04 6.5 17.5 8.96 17.5 12C17.5 15.04 15.04 17.5 12 17.5Z" fill="currentColor"/>
                            <path d="M12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z" fill="currentColor"/>
                            <line x1="2.5" y1="21.5" x2="21.5" y2="2.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
            </div>

            <button class="btn-primary">Log in</button>

            <div class="divider">Or</div>

            <button class="btn-secondary">
                <svg width="20" height="20" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#25F4EE" d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z" transform="translate(4,4)"/>
                    <path fill="#FE2C55" d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z" transform="translate(-4,-4)"/>
                    <path fill="#FFFFFF" d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z"/>
                </svg>
                Log in with TikTok
            </button>

            <a href="#" class="problems-link">Having problems logging in with TikTok?</a>
        </div>
    </div>

    <!-- Peringatan Keamanan Cyber -->
    <div class="cyber-warning-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span><strong>Peringatan Edukasi:</strong> Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan url sebelum memasukan data sensitive</span>
    </div>

</body>
</html>
